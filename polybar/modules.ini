[module/xwindow]
type = internal/xwindow
label = %title:0:100:...%
label-padding = 2
label-empty = ~ 
label-empty-padding = 2
label-empty-foreground = ${colors.contrast4}
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}

label-layout = %layout%

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = ${colors.foreground}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#0a81f5}%mountpoint%%{F-}: %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/bspwm]
type = internal/bspwm

format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
strip-wsnumbers = true
pin-workspaces = true

label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e60053 

ws-icon-0 = I;
ws-icon-1 = II;
ws-icon-2 = III;
ws-icon-default = 
label-dimmed-underline = ${colors.background}

label-focused= %index%  %icon%
label-focused-foreground = ${colors.light2}
label-focused-background = ${colors.dark1}
label-focused-underline = ${colors.contrast4}
label-focused-padding = 1.5

label-occupied-background = ${colors.dark1}
label-occupied = %index%  %icon%
label-occupied-padding = 1.5

label-urgent = %index%  %icon%
label-urgent-foreground = ${colors.dark1}
label-urgent-background = ${colors.contrast2}
label-urgent-padding = 1.5

label-empty = 
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

label-visible = %index%  %icon%

[module/mpd]
type = internal/mpd
format-online = <icon-prev> <icon-stop> <icon-play> <icon-pause> <icon-next> <icon-repeat> <icon-random> <bar-progress> <label-time> <label-song>


icon-prev = 
icon-stop = 
icon-play = 
icon-pause = 
icon-next =  
icon-random = 
icon-repeat = 


bar-progress-width = 45
bar-progress-format = %{A4:mpdseek+2: A5:mpdseek-2:}%fill%%indicator%%empty%%{A A}
bar-progress-indicator = |
bar-progress-indicator-foreground = #ff
bar-progress-fill = ─
bar-progress-fill-foreground = #bb
bar-progress-empty = ─
bar-progress-empty-foreground = #44 
[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>

label = 

bar-width = 6
bar-indicator = |
bar-indicator-foreground = #ff
bar-fill = ─
bar-fill-foreground = #ff
bar-empty = ─
bar-empty-foreground = #44

[module/backlight-acpi]
inherit = module/xbacklight
type = internal/backlight
card = intel_backlight

[module/cpu]
type = internal/cpu
interval = 0.5
format = <label>
label-padding = 2
label =  %percentage:2%%
format-underline = ${colors.subtle0}

[module/memory]
type = internal/memory
format = <label>
label =   %gb_used%/%gb_free%
format-underline = ${colors.subtle1}

[module/wlan]
type = internal/network
interface = wlp7s0
interval = 3.0
format-underline = ${colors.subtle0}

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
label-disconnected =    not connected
label-disconnected-foreground = #66

ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 
ramp-signal-3 = 
ramp-signal-4 = 

[module/eth]
type = internal/network
interface = enp8s0
interval = 3.0

label-connected =  %{T3}%local_ip%%{T-}
label-disconnected-foreground = #66
[module/date]
type = internal/date
interval = 5

date =   %%{F#99}%Y-%m-%d%%{F-}  %%{F#fff}%H:%M%%{F-}
date-alt = %%{F#fff}%A, %d %B %Y  %%{F#fff}%H:%M%%{F#666}:%%{F#fba922}%S%%{F-}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-underline = ${colors.subtle0}

label-muted =   muted
label-muted-foreground = #66

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-3 = 

[module/alsa]
type = internal/alsa

format-volume = <label-volume> <bar-volume>
label-volume = VOL
label-volume-foreground = ${root.foreground}
format-underline = ${colors.subtle0}

format-muted-prefix = " "
format-muted-foreground = ${colors.foreground-alt}
label-muted = sound muted

bar-volume-width = 10
bar-volume-foreground-0 = #55aa55
bar-volume-foreground-1 = #55aa55
bar-volume-foreground-2 = #55aa55
bar-volume-foreground-3 = #55aa55
bar-volume-foreground-4 = #55aa55
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = false
bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.foreground-alt}

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 98

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-0-foreground = #f53c3c
ramp-capacity-1-foreground = #ffa900

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

format = <ramp> <label>
label-padding = 0
format-underline = ${colors.background} 
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.foreground}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.foreground}

[module/powermenu]
type = custom/menu

format-padding = 1
label-open =  
label-close = 

menu-0-0 = "Terminate " 
menu-0-0-foreground = #fba922
menu-0-0-exec = i3-msg exit
menu-0-1 = "Reboot "
menu-0-1-foreground = #fba922
menu-0-1-exec = menu-open-1
menu-0-2 = "Power off " 
menu-0-2-foreground = #fba922
menu-0-2-exec = menu-open-2

menu-1-0 = "Cancel "
menu-1-0-exec = menu-open-0
menu-1-0-foreground = #fba922
menu-1-1 = "Reboot "
menu-1-1-exec = systemctl reboot

menu-2-1 = "Power Off "
menu-2-1-foreground = #fba922
menu-2-1-exec = systemctl poweroff 
menu-2-0 = "Cancel "
menu-2-0-foreground = #fba922
menu-2-0-exec = menu-open-0

[module/mpris]
type = custom/script 
icon = ♫
exec = ~/.config/polybar/scripts/mpris_tail.py --icon-stopped '' --truncate-text '..' -f '%{A1:playerctl previous:}♫ %{A}| {:artist:t18:{artist}:}{:artist: - :}{:t40:{title}:}'
tail = true
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 2
label = "%output%"
click-left = ~/.config/polybar/scripts/mpris_tail.py play-pause &
click-right = ~/.config/polybar/scripts/mpris_tail.py next &