[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = caps lobk 

format-prefix = " %{T5}%{T-} "
format-prefix-foreground = ${colors.foreground-alt}
format-prefix-underline = #f52a0a

label-layout = %layout%
label-layout-underline = #f52a0a 

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = #f52a0a
label-indicator-underline = #f52a0a

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#0a81f5}%mountpoint%%{F-}: %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/bspwm]

type = internal/bspwm
format = <label-state> <label-mode>

ws-icon-0 = 1;%{T3}%{T-}
ws-icon-2 = 3;%{T3}%{T-}
ws-icon-1 = 2;%{T4}%{T-}
ws-icon-3 = 4;%{T3}%{T-}
ws-icon-4 = 5;%{T3}%{T-}
ws-icon-5 = 6;%{T3}%{T-}
ws-icon-default = %{T3}%{T-}

label-focused = %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 4

label-occupied = %icon%
label-occupied-padding = 4

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 4

label-empty = %icon%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 4

[module/cpu]
type = internal/cpu
interval = 4
format-prefix = "%{A1:~/.config/rofi/scripts/rofi-cpu-governor:}%{T10}%{T-}%{A}"
format-prefix-foreground = ${colors.foreground-alt}
format-underline = #f90000
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 4
;format-prefix = " "
format-prefix ="%{A1:sudo bash -c "echo 3 > /proc/sys/vm/drop_caches":}%{T5}%{T-} %{A}"
format-prefix-foreground = ${colors.foreground-alt}
format-underline = #4bffdc
label =%percentage_used%%


[module/date]
type = internal/date
interval = 5

date =
date-alt = " %d/%m/%Y"

time = %H:%M
time-alt = %H:%M

;format-prefix = 
format-prefix = %{T5}%{T-}
format-prefix-foreground = ${colors.foreground-alt}
;format-underline = #0a6cf5
format-underline = #C00AF5
label = %{A3:~/.config/rofi/scripts/calendar:}%date% %time%%{A}

[module/pulseaudio]
type = internal/pulseaudio

format-volume =%{A3:~/scripts/mixer &:} <label-volume> <bar-volume>%{A}

label-volume = "  %{T6}%{T-} " 
label-volume-foreground = ${root.foreground}

label-muted = "   %{T6}%{T-}  %{T6}ﭳﭳﭳﭳﭳﭳﭳﭳﭳﭳ%{T-}"
#label-muted-foreground = #666
label-muted-foreground = ${colors.foreground-alt}

bar-volume-width = 11
bar-volume-foreground-0 = #C140C1
bar-volume-foreground-1 = #C140C1
bar-volume-foreground-2 = #C140C1
bar-volume-foreground-3 = #C140C1
bar-volume-foreground-4 = #C140C1
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = true
bar-volume-indicator = 
bar-volume-indicator-font = 2
bar-volume-fill = %{T6}ﭳ%{T-}
bar-volume-fill-font = 2
bar-volume-empty = %{T6}ﭳ%{T-}
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.foreground-alt}
#bar-volume-empty-foreground = #666

[module/backlight]
type = internal/backlight
card = intel_backlight

enable-scroll = true 
scroll-up = light -A 5
scroll-down = light -U 5 
format = <label> <bar> 
label = "%{T6}ﯦ%{T-} "

bar-width = 11 
bar-foreground-0 = #f0cc00 
bar-indicator = 
bar-indicator-font = 2 
bar-fill = %{T6}ﭳ%{T-}
bar-fill-font = 2
bar-empty = %{T6}ﭳ%{T-}
bar-empty-font = 2
bar-empty-foreground = ${colors.foreground-alt}

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD 
full-at = 98 

format-discharging-padding = 0

;format-charging = <ramp-capacity> <label-charging>
format-charging = %{A1:~/scripts/polybar/batterylife:}<animation-charging><label-charging>%{A}
format-charging-underline = #ffb52a

format-discharging= %{A1:~/scripts/polybar/batterylife:}<ramp-capacity>  <label-discharging>%{A}
; format-discharging = <ramp-capacity>  <label-discharging> 
;format-discharging = <animation-discharging> <label-discharging>
format-discharging-underline = ${self.format-charging-underline}

format-full-prefix = "%{T1}  %{T-} "
format-full-prefix-foreground = ${colors.foreground-alt}
format-full-underline = ${self.format-charging-underline}

ramp-capacity-0 = %{T2}%{T-}
ramp-capacity-1 = %{T2}%{T-}
ramp-capacity-2 = %{T2}%{T-}
ramp-capacity-3 = %{T2}%{T-}
ramp-capacity-4 = %{T2}%{T-}
ramp-capacity-5 = %{T2}%{T-}
ramp-capacity-6 = %{T2}%{T-}
ramp-capacity-7 = %{T2}%{T-}
ramp-capacity-8 = %{T2}%{T-}
ramp-capacity-9 = %{T2}%{T-}
ramp-capacity-10 = %{T2}%{T-}
ramp-capacity-foreground = ${colors.foreground-alt}

animation-charging-0 = %{T10}%{T-}
animation-charging-1 = %{T10}%{T-}
animation-charging-2 = %{T10}%{T-}
animation-charging-3 = %{T10}%{T-}
animation-charging-4 = %{T10}%{T-}
animation-charging-5 = %{T10}%{T-}

animation-charging-foreground = ${colors.foreground-alt}
animation-charging-framerate = 750

;animation-discharging-0 = %{T1}%{T-}
;animation-discharging-1 = %{T1}%{T-}
;animation-discharging-2 = %{T1}%{T-}
;animation-discharging-3 = %{T1}%{T-}
;animation-discharging-4 = %{T1}%{T-}
;animation-discharging-foreground = ${colors.foreground-alt}
;animation-discharging-framerate = 750

[module/alsa]
type = internal/alsa

format-volume = <label-volume> <bar-volume>
label-volume = VOL
label-volume-foreground = ${root.foreground}
format-underline = ${colors.subtle0}

format-muted-prefix = " "
format-muted-foreground = ${colors.foreground-alt}
label-muted = sound muted

bar-volume-width = 10
bar-volume-foreground-0 = #55aa55
bar-volume-foreground-1 = #55aa55
bar-volume-foreground-2 = #55aa55
bar-volume-foreground-3 = #55aa55
bar-volume-foreground-4 = #55aa55
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = false
bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.foreground-alt}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

format = <ramp> <label>
format-underline = #f50a4d
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}

ramp-3 = %{T5}%{T-}
ramp-2 = %{T5}%{T-}
ramp-1 = %{T5}%{T-}
ramp-0 = %{T5}%{T-}

ramp-foreground = ${colors.foreground-alt}

[module/mpris]
type = custom/script 
icon = ♫
exec = ~/.config/polybar/scripts/mpris_tail.py --icon-stopped '' --truncate-text '..' -f '%{A1:playerctl previous:}♫ %{A}| {:artist:t18:{artist}:}{:artist: - :}{:t40:{title}:}'
tail = true
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 2
label = "%output%"
click-left = ~/.config/polybar/scripts/mpris_tail.py play-pause &
click-right = ~/.config/polybar/scripts/mpris_tail.py next &

[module/optimusgpu]
type = custom/script
exec = ~/scripts/polybar/optimusgpu

format = <label> 
label = "%{T7}%output%%{T-}"
format-margin = 4

click-middle = ~/scripts/polybar/optiswitch
interval = 999999 

[module/repoup]
type = custom/ipc
format = %{u#17A8F1}%{+u}%{F#555}  %{T2}%{T-}%{F-} <output>  %{-u}
hook-0 = (sudo sh -c "pacman -Sy > /dev/null && pacman -Qu | wc -l || echo ?") &
initial = 1

click-left = polybar-msg -p %pid% hook repoup 1

[module/battery-time]
type = custom/ipc
format =<output>
; hook-0 = echo ""
hook-0 = echo "%{F#555}|%{F-}" &
hook-1 =echo "%{u#ffb52a}%{+u}$(acpi -b | cut -d ' ' -f 5 | cut -c1-5)%{-u}"&
initial = 1

[module/logo]
type = custom/text
content = "    %{T11}%{F#C140C1}%{F-}%{T-}   %{F#555}|%{F-}"
click-left = pkill xmenu || sh ~/scripts/xmenu.sh 

[module/wlan-eth]
type = custom/ipc
format =<output>
hook-0 = echo "%{u#1e8a32}%{F#555} %{T9}󰤭%{T-} Off %{F-}" &
hook-1 = $HOME/scripts/polybar/wlan &
hook-2 = echo "%{F#555}%{T9}󰈀%{T-}%{F-} $(ifconfig enp4s0 | awk '$1=="inet" {print $2}')" &
hook-3 = echo "%{F#555}%{T9}󰤩%{T-} | %{T9}󰈀%{T-}%{F-} $(ifconfig enp4s0 | awk '$1=="inet" {print $2}')" &
initial = 1
format-underline = #2EDE4E
click-left = $HOME/.config/rofi/scripts/nmcli-rofi &
click-right = bspc rule -a '*' -o state=floating && nm-connection-editor &





